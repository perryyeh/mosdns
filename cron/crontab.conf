# mosdns rule sync - daily at 00:00
0 0 * * * /etc/mosdns/cron/sync-rules.sh >> /etc/mosdns/tmp/sync-rules-$(date +\%F).log 2>&1

# mosdns candidate domain sync - hourly at minute 5, stats only, no reload
5 * * * * /etc/mosdns/cron/sync-candidates.sh >> /etc/mosdns/tmp/sync-candidates-$(date +\%F).log 2>&1

# mosdns candidate promotion - daily at 00:20
20 0 * * * /etc/mosdns/cron/promote-candidates.sh >> /etc/mosdns/tmp/promote-candidates-$(date +\%F).log 2>&1

# mosdns deferred reload/restart - daily at 00:30, at most once
30 0 * * * /etc/mosdns/cron/reload-if-needed.sh >> /etc/mosdns/tmp/reload-$(date +\%F).log 2>&1

# keep only the last 7 days of mosdns cron logs
40 0 * * * find /etc/mosdns/tmp -maxdepth 1 -type f \( -name 'sync-rules-*.log' -o -name 'sync-candidates-*.log' -o -name 'promote-candidates-*.log' -o -name 'reload-*.log' \) -mtime +6 -delete
