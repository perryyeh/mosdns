plugins:

  # no ecs
  - tag: no_ecs
    type: "ecs_handler"
    args:
      forward: false # 是否转发来自下游的 ecs
      preset: "" # 发送预设 ecs
      send: false # 是否发送 ecs
      mask4: 24
      mask6: 48 
  
  # 附加 ecs cn 信息
  - tag: ecs_cn
    type: "ecs_handler"
    args:
      forward: false # 是否转发来自下游的 ecs
      preset: "116.228.111.118" # 发送预设 ecs
      send: true # 是否发送 ecs
      mask4: 24 # ipv4 掩码。默认 24
      mask6: 48 # ipv6 掩码。默认 48

  # google doh dot
  - tag: google
    type: forward
    args:
      concurrent: 1
      upstreams:
        - addr: "https://dns.google/dns-query"
          # dial_addr: "8.8.8.8" # 8.8.4.4 2001:4860:4860::8888 2001:4860:4860::8844
          # socks5: "10.0.0.120:6153"  #修改点，改为自己的代理
          bootstrap: "198.18.0.2" #修改点，改为域名解析服务器
        - addr: "tls://dns.google"
          # dial_addr: "8.8.8.8"
          # socks5: "10.0.0.120:6153"
          bootstrap: "198.18.0.2" 
          enable_pipeline: true

  # cloudflare doh dot
  - tag: cloudflare
    type: forward
    args:
      concurrent: 1
      upstreams:
        - addr: "https://cloudflare-dns.com/dns-query"
          # dial_addr: "1.1.1.1" # 1.0.0.1 2606:4700:4700::1111 2606:4700:4700::1001
          # socks5: "10.0.0.120:6153"
          bootstrap: "198.18.0.2"
        - addr: "tls://cloudflare-dns.com"
          # dial_addr: "1.1.1.1"
          # socks5: "10.0.0.120:6153"
          bootstrap: "198.18.0.2"
          enable_pipeline: true

  # ali doh dot
  - tag: ali
    type: forward
    args:
      concurrent: 2
      upstreams:
        - addr: "https://dns.alidns.com/dns-query"
          bootstrap: "223.5.5.5"
        - addr: "tls://dns.alidns.com"
          bootstrap: "223.6.6.6"
          enable_pipeline: true

  # tencent doh dot
  - tag: tencent
    type: forward
    args:
      concurrent: 1
      upstreams:
        - addr: "https://doh.pub/dns-query"
          bootstrap: "1.12.12.12"
        - addr: "tls://dot.pub"
          bootstrap: "120.53.53.53"
          enable_pipeline: true

  # local dns
  - tag: local
    type: forward
    args:
      concurrent: 1
      upstreams:
        - addr: "udp://10.0.0.1"

  # fake ip
  - tag: forward_fakeipv4
    type: forward
    args:
      concurrent: 1
      upstreams:
        - addr: "udp://198.18.0.2"

  # fake ip v6
  - tag: forward_fakeipv6
    type: forward
    args:
      concurrent: 1
      upstreams:
        - addr: "udp://[fd00:6152::2]:53"

  # fakeip 地址段，用于匹配 fakeip 返回结果
  - tag: fakeip_cidr
    type: ip_set
    args:
      ips:
        - "198.18.0.0/15"
        - "fd00:6152:0:9::/64"
