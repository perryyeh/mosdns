log:
  level: info
  file: ""

api:
  http: "0.0.0.0:9091"

include:
  - "./data.yaml"
  - "./dns.yaml"

plugins:
  # 转发组 - 直连
  - tag: forward_direct_group
    type: fallback
    args:
      primary: ali
      secondary: tencent
      threshold: 50
      always_standby: true

  # 转发组 - 代理
  - tag: forward_proxy_group
    type: fallback
    args:
      primary: cloudflare
      secondary: google
      threshold: 100
      always_standby: true

  # fakeip 分发：AAAA → v6, A → v4
  - tag: sequence_fakeip
    type: sequence
    args:
      - matches: "qtype 28"
        exec: $forward_fakeipv6
      - matches: "qtype 1"
        exec: $forward_fakeipv4

  # 不在名单中的域名
  - tag: sequence_not_in_list
    type: sequence
    args:
      # SVCB/HTTPS (qtype 64/65) 强制 NODATA，防止 ipv6hint/ipv4hint 泄露真实 IP
      # 必须在 forward 之前拦截，否则 remote 返回的 SVCB 会被透传
      - matches: "qtype 64 65"
        exec: reject 0
      - matches: "qtype 64 65"
        exec: return

      - exec: $ecs_cn
      - exec: $forward_proxy_group

      # 不带 ECS 查就近
      - exec: $no_ecs

      # A/AAAA 是 CN IP → 国内再查一遍（获取更合适的国内 IP）
      - matches:
        - "qtype 1 28"
        - "resp_ip $geoip_cn"
        exec: $forward_direct_group

      # A/AAAA 无 IP → 国内再查一遍
      - matches:
        - "qtype 1 28"
        - "!resp_ip 0.0.0.0/0 ::/0"
        exec: $forward_direct_group

      # 国内查完如果无结果，返回（保留 NXDOMAIN/NODATA）
      - matches:
        - "qtype 1 28"
        - "!resp_ip 0.0.0.0/0 ::/0"
        exec: return

      # 国内查完：若是 CN IP，记录到日志并接受返回真实 IP
      - matches: "resp_ip $geoip_cn"
        exec: query_summary not_in_list_direct
      - matches: "resp_ip $geoip_cn"
        exec: return

      # 非 A/AAAA：直接返回 remote 结果（无需 fakeip）
      - matches: "!qtype 1 28"
        exec: return

      # 剩下的情况（A/AAAA 有 IP 且非 CN） → fakeip
      - exec: drop_resp
      - exec: $sequence_fakeip
      - matches: "resp_ip 198.18.0.0/15 fd00:6152:0:9::/64"
        exec: query_summary not_in_list_fake
      - exec: return

  # 主逻辑
  - tag: sequence_main
    type: sequence
    args:
      # 1. geosite_local 交给 local 去解析
      - matches: qname $geosite_local
        exec: $local
      - matches: qname $geosite_local
        exec: accept

      # 2. geosite_my_hosts 直接读取里面的解析地址
      - exec: $geosite_my_hosts
      - matches: has_resp
        exec: accept

      # 3. 自定义黑名单：最高优先级，压过所有公共规则和自定义白/灰名单
      - matches: qname $geosite_my_blacklist
        exec: reject 3
      - matches: qname $geosite_my_blacklist
        exec: return

      # 4. 自定义灰名单：走 fakeip，压过自定义白名单里的宽泛规则和公共 direct
      # SVCB/HTTPS 强制 NODATA，防止 ipv6hint/ipv4hint 泄露真实 IP
      - matches:
        - qname $geosite_my_greylist
        - qtype 64 65
        exec: reject 0
      - matches:
        - qname $geosite_my_greylist
        - qtype 64 65
        exec: return
      - matches: qname $geosite_my_greylist
        exec: $sequence_fakeip
      - matches: has_resp
        exec: accept
      # 非 A/AAAA：代理直查
      - matches: qname $geosite_my_greylist
        exec: $forward_proxy_group
      - matches: has_resp
        exec: accept

      # 5. 自定义白名单：走 ali 和 tencent，压过公共 proxy
      - matches: qname $geosite_my_whitelist
        exec: $forward_direct_group
      - matches: has_resp
        exec: accept

      # 6. 公共 blocklist：直接返回无法解析
      - matches: qname $geosite_block
        exec: reject 3
      - matches: qname $geosite_block
        exec: return

      # 7. 公共 proxy：走 fakeip，优先于公共 direct，降低污染风险
      # SVCB/HTTPS 强制 NODATA，防止 ipv6hint/ipv4hint 泄露真实 IP
      - matches:
        - qname $geosite_proxy
        - qtype 64 65
        exec: reject 0
      - matches:
        - qname $geosite_proxy
        - qtype 64 65
        exec: return
      - matches: qname $geosite_proxy
        exec: $sequence_fakeip
      - matches: has_resp
        exec: accept
      # 非 A/AAAA：代理直查
      - matches: qname $geosite_proxy
        exec: $forward_proxy_group
      - matches: has_resp
        exec: accept

      # 8. 公共 direct：走 ali 和 tencent 去解析
      - matches: qname $geosite_direct
        exec: $forward_direct_group
      - matches: has_resp
        exec: accept

      # 9. 剩下的不在名单中的域名 兜底逻辑
      - exec: $sequence_not_in_list
      - matches: has_resp
        exec: accept

  # 启动服务器
  - tag: udp_main
    type: udp_server
    args:
      entry: sequence_main
      listen: ":53"

  - tag: tcp_main
    type: tcp_server
    args:
      entry: sequence_main
      listen: ":53"
