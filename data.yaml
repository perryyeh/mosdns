plugins:
  ################## 数据源 ################

  - tag: geoip_cn # cn ip
    type: ip_set
    args:
      files:
        - "./rule/geoip_cn.txt"

  - tag: geosite_local # 内网域名 -> 路由器
    type: domain_set
    args:
      files:
        - "./rule/geosite_local.txt"

  - tag: geosite_my_hosts # 自定义解析 -> 自定义
    type: hosts
    args:
      files:
        - "./my/hosts.txt"

  - tag: geosite_my_blacklist # 自定义黑名单 -> 拒绝（最高优先级）
    type: domain_set
    args:
      files:
        - "./my/blacklist.txt"

  - tag: geosite_my_greylist # 自定义灰名单 -> 代理（压过自定义白名单和公共 cn）
    type: domain_set
    args:
      files:
        - "./my/greylist.txt"

  - tag: geosite_my_whitelist # 自定义白名单 -> 国内（压过公共 proxy）
    type: domain_set
    args:
      files:
        - "./my/whitelist.txt"

  - tag: geosite_block # 公共非法域名 -> 拒绝
    type: domain_set
    args:
      files:
        - "./rule/geosite_block.txt"

  - tag: geosite_direct # 公共 direct 域名 -> 国内
    type: domain_set
    args:
      files:
        - "./rule/geosite_direct.txt"
        - "./rule/geosite_applecn.txt"
        - "./rule/geosite_googlecn.txt"

  - tag: geosite_proxy # 公共 proxy 域名 -> 代理
    type: domain_set
    args:
      files:
        - "./rule/geosite_proxy.txt"
